<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información — Todo Máquinas</title>
  <link rel="stylesheet" href="css/styles.css?v=22">
  <link rel="icon" href="assets/logo.jpg">
  <style>
    .info-layout{display:grid;grid-template-columns:240px 1fr;gap:30px;align-items:start;margin:24px 0 40px}
    .info-nav{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:10px;position:sticky;top:90px}
    .info-nav a{display:block;padding:11px 14px;border-radius:8px;font-size:.9rem;font-weight:600;color:var(--gris-700)}
    .info-nav a:hover{background:var(--gris-100)}
    .info-nav a.active{background:var(--teal);color:#fff}
    .info-content{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:34px 40px;max-width:880px}
    .info-content h1{font-size:1.8rem;margin-bottom:6px}
    .info-content .upd{color:var(--gris-500);font-size:.82rem;margin-bottom:24px}
    .info-content h2{font-size:1.15rem;margin:26px 0 10px;color:var(--teal-osc)}
    .info-content p,.info-content li{color:var(--gris-700);margin-bottom:10px;line-height:1.65}
    .info-content ul{padding-left:22px}
    .info-content .demo-note{background:var(--teal-claro);border-left:4px solid var(--teal);padding:14px 16px;border-radius:8px;font-size:.9rem;margin:18px 0}
    .info-content .cards-pay{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:18px 0}
    .pay-card{border:2px solid var(--gris-300);border-radius:var(--radio);padding:18px;text-align:center}
    .pay-card .pc-ico{font-size:2rem}
    .pay-card b{display:block;margin:6px 0 4px}
    .pay-card span{font-size:.82rem;color:var(--gris-500)}
    .pay-card.mp{border-color:#009ee3}
    .link-pago{display:inline-flex;align-items:center;gap:8px;background:#009ee3;color:#fff;font-weight:700;padding:12px 22px;border-radius:10px;margin-top:8px}
    @media(max-width:820px){.info-layout{grid-template-columns:1fr}.info-nav{position:static}}
  </style>
</head>
<body>
  <div id="app-header"></div>
  <main class="container">
    <div class="breadcrumb"><a href="index.html">Inicio</a> › <span id="bc">Información</span></div>
    <div class="info-layout">
      <nav class="info-nav" id="info-nav"></nav>
      <article class="info-content" id="info-content"></article>
    </div>
  </main>
  <div id="app-footer"></div>

  <script src="js/data.js?v=22"></script>
  <script src="js/cart.js?v=22"></script>
  <script src="js/ui.js?v=22"></script>
  <script src="js/info.js?v=22"></script>
</body>
</html>
